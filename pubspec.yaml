name: expense_tracker
description: A production-ready expense tracker application with SQLite storage, form validation, and statistics.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  image: ^4.1.1
  intl: ^0.19.0
  fl_chart: ^0.65.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
